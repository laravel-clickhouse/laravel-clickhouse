name: tests

on:
  push:
  pull_request:
  workflow_call:

jobs:
  tests:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"

    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.2"
          - "8.3"
          - "8.4"
          - "8.5"
        laravel:
          - "^11.21"
          - "^12.0"
          - "^13.0"
        exclude:
          - php: "8.2"
            laravel: "^13.0"

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24-alpine
        env:
          CLICKHOUSE_DB: default
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: default
        ports:
          - 8123:8123

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Installing php
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: pcov

      - name: Install dependencies
        run: |
          composer require "illuminate/database:${{ matrix.laravel }}" --dev --no-update
          composer update --prefer-dist -n -o

      - name: Execute tests
        run: |
          vendor/bin/pint src tests --test
          vendor/bin/phpstan analyse
          vendor/bin/phpunit --testsuite=Unit --coverage-text
          vendor/bin/phpunit --testsuite=Feature --coverage-text
